<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" fill="#0a0a1a"/>
  
  <!-- Definitions -->
  <defs>
    <linearGradient id="borderGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="50%" style="stop-color:#ffed4a"/>
      <stop offset="100%" style="stop-color:#ffd700"/>
    </linearGradient>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#0d0d2b"/>
    </linearGradient>
  </defs>
  
  <!-- Main ticket body -->
  <rect x="20" y="20" width="760" height="360" rx="20" fill="url(#bgGradient)" stroke="url(#borderGradient)" stroke-width="3"/>
  
  <!-- Decorative circles (perforations) -->
  <circle cx="20" cy="200" r="15" fill="#0a0a1a"/>
  <circle cx="780" cy="200" r="15" fill="#0a0a1a"/>
  
  <!-- Event Title -->
  <text x="400" y="100" font-family="Arial, sans-serif" font-size="42" fill="#ffffff" text-anchor="middle" font-weight="bold">CHAMPIONS LEAGUE</text>
  <text x="400" y="150" font-family="Arial, sans-serif" font-size="32" fill="#ffd700" text-anchor="middle" font-weight="bold">FINAL 2026</text>
  
  <!-- Venue -->
  <text x="400" y="195" font-family="Arial, sans-serif" font-size="18" fill="#aaaaaa" text-anchor="middle">ALLIANZ ARENA, MUNICH</text>
  
  <!-- Divider line -->
  <line x1="60" y1="230" x2="740" y2="230" stroke="#ffd700" stroke-width="1" stroke-dasharray="10,5"/>
  
  <!-- Date (left side) -->
  <text x="250" y="280" font-family="Arial, sans-serif" font-size="14" fill="#888888" text-anchor="middle">DATE</text>
  <text x="250" y="320" font-family="Arial, sans-serif" font-size="26" fill="#ffffff" text-anchor="middle" font-weight="bold">MAY 30, 2026</text>
  
  <!-- Time (right side) -->
  <text x="550" y="280" font-family="Arial, sans-serif" font-size="14" fill="#888888" text-anchor="middle">TIME</text>
  <text x="550" y="320" font-family="Arial, sans-serif" font-size="26" fill="#ffffff" text-anchor="middle" font-weight="bold">21:00 CET</text>
</svg>